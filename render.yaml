services:
  - type: web
    name: lens-detection-backend
    runtime: docker
    plan: free
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lens-detection-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000,https://localhost:3000,https://*.vercel.app"
      - key: PORT
        value: "8000"
      - key: PYTHON_UNBUFFERED
        value: "1"
    dependsOn:
      - lens-detection-db

databases:
  - name: lens-detection-db
    databaseName: lens_inspections
    user: lens_user
    plan: basic-256mb
    region: oregon

deploy:
  trigger: github
  branch: main
