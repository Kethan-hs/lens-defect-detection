services:
  # PostgreSQL Database Service
  - type: pserv
    name: lens-detection-db
    plan: free
    ipAllowList: []
    databases:
      - name: lens_inspections
        user: lens_user

  # FastAPI Backend Service
  - type: web
    name: lens-detection-backend
    plan: free
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    
    # Health check configuration
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lens_inspections
          property: connectionString
        
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000,https://localhost:3000,https://*.vercel.app"
        
      - key: PORT
        value: "8000"
        
      - key: PYTHON_UNBUFFERED
        value: "1"
        
      - key: PYTHONUNBUFFERED
        value: "1"
    
    # Resource configuration for free tier
    disk:
      name: lens-models-data
      sizeGB: 10
      mountPath: /app/data
    
    # Connect to the database service
    depends_on:
      - lens-detection-db

# Auto-deploy on git push
deploy:
  trigger: github
  branch: main
