services:
  # PostgreSQL Database Service
  - type: postgres
    name: lens-detection-db
    plan: free
    region: oregon

  # FastAPI Backend Service
  - type: web
    name: lens-detection-backend
    env: docker
    plan: free
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lens-detection-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000,https://localhost:3000,https://*.vercel.app"
      - key: PORT
        value: "8000"
      - key: PYTHON_UNBUFFERED
        value: "1"
    dependsOn:
      - lens-detection-db

# Auto-deploy on git push
deploy:
  trigger: github
  branch: main
